x-app-env: &app-env
  DATABASE_URL: postgresql://fittrack:${DB_PASSWORD:-strongpassword}@postgres:5432/fittrack_db?schema=public
  REDIS_URL: redis://redis:6379
  JWT_SECRET: ${JWT_SECRET:-replace_with_256bit_random_secret_never_expose}
  JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-replace_with_different_256bit_secret}
  JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
  JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
  AUTH_SERVICE_PORT: ${AUTH_SERVICE_PORT:-5001}
  INGESTION_API_PORT: ${INGESTION_API_PORT:-5002}
  ANALYTICS_SERVICE_PORT: ${ANALYTICS_SERVICE_PORT:-5003}
  NODE_ENV: ${NODE_ENV:-production}
  BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
  MAX_WAYPOINTS_PER_ACTIVITY: ${MAX_WAYPOINTS_PER_ACTIVITY:-100000}
  ACTIVITY_QUEUE_NAME: ${ACTIVITY_QUEUE_NAME:-activity_queue}
  SEED_ON_STARTUP: ${SEED_ON_STARTUP:-false}
  SEED_USERNAME: ${SEED_USERNAME:-runner1}
  SEED_EMAIL: ${SEED_EMAIL:-runner1@test.com}
  SEED_PASSWORD: ${SEED_PASSWORD:-Securepass1!}

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: fittrack_postgres
    restart: unless-stopped
    shm_size: 256mb
    environment:
      POSTGRES_USER: fittrack
      POSTGRES_PASSWORD: ${DB_PASSWORD:-strongpassword}
      POSTGRES_DB: fittrack_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"

  redis:
    image: redis:7-alpine
    container_name: fittrack_redis
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  nginx:
    image: nginx:alpine
    container_name: fittrack_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
      - "${NGINX_HTTPS_PORT:-8443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - auth-user-service
      - activity-ingestion-api
      - analytics-service

  auth-user-service:
    build:
      context: .
      dockerfile: auth-user-service/Dockerfile
    container_name: fittrack_auth
    restart: unless-stopped
    environment:
      <<: *app-env
    depends_on:
      - postgres
    command: >
      sh -c "node scripts/wait-for-tcp.js postgres 5432 && npx prisma migrate deploy --schema=./prisma/schema.prisma && node scripts/seed.js && node server.js"

  activity-ingestion-api:
    build:
      context: .
      dockerfile: activity-ingestion-api/Dockerfile
    container_name: fittrack_ingestion
    restart: unless-stopped
    environment:
      <<: *app-env
    depends_on:
      - postgres
      - redis

  spatial-processing-worker:
    build:
      context: .
      dockerfile: spatial-processing-worker/Dockerfile
    container_name: fittrack_worker
    restart: unless-stopped
    environment:
      <<: *app-env
    depends_on:
      - postgres
      - redis

  analytics-service:
    build:
      context: .
      dockerfile: analytics-service/Dockerfile
    container_name: fittrack_analytics
    restart: unless-stopped
    environment:
      <<: *app-env
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  redis_data:

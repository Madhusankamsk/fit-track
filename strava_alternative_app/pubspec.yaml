name: fittrack_pro
description: High-performance fitness tracker
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  dio: ^5.4.3
  dio_smart_retry: ^6.0.0
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  flutter_background_service: ^5.0.5
  geolocator: ^11.0.0
  permission_handler: ^11.3.1
  flutter_map: ^6.2.1
  latlong2: ^0.9.1
  go_router: ^13.2.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  intl: ^0.19.0
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

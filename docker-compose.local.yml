# Local Docker trial overrides — avoids port clashes with native dev services.
# Usage: npm run docker:up

x-app-env: &app-env
  DATABASE_URL: postgresql://fittrack:${DB_PASSWORD:-strongpassword}@postgres:5432/fittrack_db?schema=public
  REDIS_URL: redis://redis:6379
  NODE_ENV: production

services:
  postgres:
    ports:
      - "5433:5432"

  redis:
    ports:
      - "6380:6379"

  nginx:
    ports:
      - "8080:80"

  auth-user-service:
    environment:
      <<: *app-env
      SEED_ON_STARTUP: "true"
      SEED_USERNAME: runner1
      SEED_EMAIL: runner1@test.com
      SEED_PASSWORD: Securepass1!

  activity-ingestion-api:
    environment:
      <<: *app-env

  spatial-processing-worker:
    environment:
      <<: *app-env

  analytics-service:
    environment:
      <<: *app-env

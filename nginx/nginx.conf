events { worker_connections 1024; }

http {
  upstream auth_service     { server auth-user-service:5001; }
  upstream ingestion_api    { server activity-ingestion-api:5002; }
  upstream analytics_svc    { server analytics-service:5003; }

  # Do not rate-limit CORS preflight requests
  map $request_method $limit_key {
    OPTIONS "";
    default $binary_remote_addr;
  }

  limit_req_zone $limit_key zone=auth:10m rate=30r/m;
  limit_req_zone $limit_key zone=ingest:10m rate=60r/m;
  limit_req_zone $limit_key zone=api:10m rate=200r/m;

  server {
    listen 80;
    server_name _;

    location /api/v1/auth/ {
      include /etc/nginx/cors-headers.conf;
      include /etc/nginx/cors-preflight.conf;
      limit_req zone=auth burst=10 nodelay;
      proxy_pass http://auth_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/v1/users/ {
      include /etc/nginx/cors-headers.conf;
      include /etc/nginx/cors-preflight.conf;
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://auth_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/ingest {
      include /etc/nginx/cors-headers.conf;
      include /etc/nginx/cors-preflight.conf;
      limit_req zone=ingest burst=10 nodelay;
      client_max_body_size 50M;
      proxy_pass http://ingestion_api;
      proxy_set_header Host $host;
      proxy_read_timeout 120s;
    }

    location /api/v1/feed {
      include /etc/nginx/cors-headers.conf;
      include /etc/nginx/cors-preflight.conf;
      limit_req zone=api burst=30 nodelay;
      proxy_pass http://ingestion_api;
      proxy_set_header Host $host;
    }

    location ~ ^/api/v1/activities/\d+/(kudos|comments)$ {
      include /etc/nginx/cors-headers.conf;
      include /etc/nginx/cors-preflight.conf;
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://analytics_svc;
      proxy_set_header Host $host;
    }

    location /api/v1/activities/ {
      include /etc/nginx/cors-headers.conf;
      include /etc/nginx/cors-preflight.conf;
      limit_req zone=api burst=30 nodelay;
      proxy_pass http://ingestion_api;
      proxy_set_header Host $host;
    }

    location /api/v1/stats/ {
      include /etc/nginx/cors-headers.conf;
      include /etc/nginx/cors-preflight.conf;
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://analytics_svc;
      proxy_set_header Host $host;
    }

    location /api/v1/segments {
      include /etc/nginx/cors-headers.conf;
      include /etc/nginx/cors-preflight.conf;
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://analytics_svc;
      proxy_set_header Host $host;
    }
  }
}
